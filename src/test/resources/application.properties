# Server port
server.port=9898

# =============================================================================
# Camunda 8.8 Self-Managed Client Configuration
# =============================================================================
# API Endpoints:
#   - Zeebe gRPC:         grpc://localhost:26500  (workflow engine)
#   - Orchestration REST: http://localhost:8088   (Operate/Tasklist APIs)
# =============================================================================
camunda.client.mode=self-managed

# Zeebe gRPC connection (must use grpc:// protocol)
camunda.client.grpc-address=grpc://localhost:26500

# REST API (Orchestration Cluster - includes Operate/Tasklist APIs)
camunda.client.rest-address=http://localhost:8088

# =============================================================================
# OIDC Authentication (for both Zeebe and REST API)
# =============================================================================
# Keycloak Configuration:
#   - URL:           http://localhost:18080/auth
#   - Admin Console: http://localhost:18080/auth/admin (admin / admin)
#   - Realm:         camunda-platform
#
# Pre-configured OAuth Clients:
#   Client ID       | Secret                    | Audience          | Purpose
#   ----------------|---------------------------|-------------------|------------------
#   connectors      | demo-connectors-secret    | orchestration-api | Connector runtime
#   orchestration   | demo-orchestration-secret | orchestration-api | Orchestration service
#   console         | demo-console-secret       | console           | Console webapp
#   optimize        | demo-optimize-secret      | optimize-api      | Optimize
# =============================================================================
camunda.client.auth.method=oidc
camunda.client.auth.token-url=http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token
camunda.client.auth.client-id=connectors
camunda.client.auth.client-secret=demo-connectors-secret
# IMPORTANT: Use orchestration-api for REST API access (including ProcessDefinitionImporter)
camunda.client.auth.audience=orchestration-api
camunda.client.auth.scope=openid profile email

# =============================================================================
# OPTION 1: DISABLE Inbound Connectors Completely (stops ProcessDefinitionImporter)
# Uncomment these if you only need outbound connectors
# =============================================================================
# camunda.connector.polling.enabled=false

# =============================================================================
# OPTION 2: Keep Inbound Enabled (requires working Operate/REST API auth)
# Comment out the polling.enabled=false above if using this option
# =============================================================================
camunda.connector.polling.enabled=true
camunda.connector.webhook.enabled=true

# Disable environment-based secrets (use Camunda secrets instead)
camunda.connector.secretprovider.environment.enabled=false

# =============================================================================
# Logging
# =============================================================================
logging.level.io.camunda.client=DEBUG
logging.level.io.camunda.connector=DEBUG
logging.level.io.camunda.connector.runtime.inbound=DEBUG
