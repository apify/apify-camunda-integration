# Configuration for running connectors locally in bundle with connector-runtime
server.port=9898
camunda.client.zeebe.grpc-address=http://localhost:26500
camunda.client.zeebe.rest-address=http://localhost:8088

# ENABLE inbound connector polling
camunda.connector.polling.enabled=true
camunda.connector.webhook.enabled=true

# Enable debug logging for your connector
logging.level.io.camunda.connector.apify=DEBUG
logging.level.io.camunda.connector.runtime.inbound=DEBUG

camunda.connector.secretprovider.environment.enabled=false

# For docker-compose.yaml (with Identity/Keycloak)
operate.client.profile=oidc
operate.client.base-url=http://localhost:8081
operate.client.auth-url=http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token
operate.client.client-id=connectors
operate.client.client-secret=XALaRPl5qwTEItdwCMiPS62nVpKs7dL7