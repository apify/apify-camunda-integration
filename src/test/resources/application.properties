# Shared configuration for outbound and inbound connectors
server.port=9898

# Camunda client configuration (Camunda 8.8+ unified properties)
camunda.client.mode=self-managed
camunda.client.grpc-address=http://localhost:26500
camunda.client.rest-address=http://localhost:8088

# Authentication for Camunda client (OIDC with Keycloak)
camunda.client.auth.token-url=http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token
camunda.client.auth.client-id=connectors
camunda.client.auth.client-secret=XALaRPl5qwTEItdwCMiPS62nVpKs7dL7
camunda.client.auth.audience=orchestration
camunda.client.auth.scope=openid profile orchestration-api

# Configuration for running inbound connectors locally in bundle with connector-runtime
camunda.connector.polling.enabled=true
camunda.connector.webhook.enabled=true
logging.level.io.camunda.connector.apify=DEBUG
logging.level.io.camunda.connector.runtime.inbound=DEBUG
camunda.connector.secretprovider.environment.enabled=false

# Operate client configuration
operate.client.profile=oidc
operate.client.base-url=http://localhost:8081
operate.client.auth-url=http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token
operate.client.client-id=connectors
operate.client.client-secret=XALaRPl5qwTEItdwCMiPS62nVpKs7dL7